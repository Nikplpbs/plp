<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เลือกสาขา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f9ff 0%, #fefce8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
      max-width: 780px;
      width: 100%;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .header-icon { font-size: 36px; }
    .title { font-size: 20px; font-weight: 700; color: #1e293b; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 4px; }

    .search {
      width: 100%;
      padding: 10px 16px;
      border-radius: 12px;
      border: 1.5px solid #e2e8f0;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      margin-bottom: 20px;
      outline: none;
      background: #f8fafc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Card แต่ละสาขา */
    .branch-card {
      border-radius: 14px;
      border: 1.5px solid #e2e8f0;
      background: #f8fafc;
      overflow: hidden;
      transition: all 0.15s ease;
    }

    .branch-card:hover { border-color: #cbd5e1; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .branch-card.starred { border: 1.5px solid #fcd34d; background: #fffef5; }
    .branch-card.no-link { opacity: 0.5; }

    /* ปุ่มหลัก — กดแล้วเปิดลิงก์ */
    .btn-main {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 12px 14px 10px 36px;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Sarabun', sans-serif;
      position: relative;
    }

    .btn-main:disabled { cursor: not-allowed; }

    .star-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #d1d5db;
      transition: color 0.15s;
      line-height: 1;
    }
    .star-btn.on { color: #f59e0b; }

    .branch-id   { font-size: 15px; font-weight: 700; color: #1e293b; line-height: 1.3; }
    .branch-name { font-size: 11px; color: #64748b; margin-top: 2px; line-height: 1.4; }
    .no-link-badge { font-size: 10px; color: #ef4444; margin-top: 3px; }

    /* Footer ของ card — ปุ่ม copy */
    .card-footer {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px 8px 10px;
      border-top: 1px solid #f1f5f9;
    }

    .link-text {
      font-size: 10px;
      color: #94a3b8;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .copy-btn {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      color: #475569;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: #e2e8f0; }
    .copy-btn.copied { background: #dcfce7; border-color: #86efac; color: #16a34a; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e293b;
      color: #fff;
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <span class="header-icon">🏪</span>
    <div>
      <div class="title">เลือกสาขาที่ต้องดูแลพิเศษ</div>
      <div class="subtitle">กดที่สาขาเพื่อเปิดลิงก์ • กด Copy เพื่อคัดลอก URL</div>
    </div>
  </div>

  <input class="search" id="searchInput" placeholder="🔍  ค้นหาสาขา..." oninput="filterBranches()" />

  <div class="grid" id="grid"></div>
</div>

<div class="toast" id="toast">📋 คัดลอกลิงก์แล้ว!</div>

<script>
  const branches = [
    { id: 85,    name: "สรรพาวุธ-บางนา (KS)",                   url: "https://allonline.link/r/kDWa1" },
    { id: 419,   name: "มอลทาเล่ย์",                             url: "https://allonline.link/r/ArR0W" },
    { id: 5552,  name: "คลองสวน",                                url: "https://allonline.link/r/OYDAb" },
    { id: 5605,  name: "สุภาพงษ์1-3 แยก 3",                     url: "https://allonline.link/r/ZP1qR" },
    { id: 8789,  name: "ม.เมืองแก้ว",                           url: "https://allonline.link/r/YPXDV" },
    { id: 9687,  name: "ตลาดทรัพย์บุญชัย",                      url: "https://allonline.link/r/wwRDa" },
    { id: 12016, name: "บางนาตราด ซ.23(โครงการ Bizzo)",         url: "https://allonline.link/r/MWM07" },
    { id: 13327, name: "สุขุมวิท 64 จุด 2",                     url: null },
    { id: 13401, name: "สตูดิโอแมทชิ่ง(บางบ่อ)",                url: "https://allonline.link/r/dklLo" },
    { id: 13544, name: "ลาดกระบัง 14 / 1",                      url: "https://allonline.link/r/D9708" },
    { id: 14748, name: "กลางซอยศรีด่าน 22",                     url: "https://allonline.link/r/qqMoa" },
    { id: 15100, name: "อ่อนนุช 30 (กลางซอย)",                  url: "https://allonline.link/r/mw0KG" },
    { id: 16070, name: "อ่อนนุช 46 (กลางซอย)",                  url: "https://allonline.link/r/pDw33" },
    { id: 16864, name: "พัฒนาการ 44",                            url: "https://allonline.link/r/RRp0L" },
    { id: 17196, name: "สวนส้ม จุด 2",                          url: "https://allonline.link/r/Gbn0L" },
    { id: 18232, name: "ปุณณวิถี 25",                            url: "https://allonline.link/r/xMGqw" },
    { id: 18562, name: "ม.ชลดา(ศรีวารีน้อย)จุด2",              url: "https://allonline.link/r/70Q86" },
    { id: 18645, name: "ม.สินทวีกรีนวิลล์ อยู่เจริญ คลองสวน", url: "https://allonline.link/r/VKjYo" },
    { id: 18813, name: "บางนาตราด กม.24 (ซอยเก็บทรัพย์)",      url: "https://allonline.link/r/wwRDP" },
    { id: 19243, name: "ซอยสุนทรวิภาค จุด 2",                   url: "https://allonline.link/r/MWM0V" },
  ];

  const starred = new Set([5605, 18232]);

  function renderGrid(list) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    list.forEach(b => {
      const isStarred = starred.has(b.id);

      // wrapper card
      const card = document.createElement("div");
      card.className = "branch-card" + (isStarred ? " starred" : "") + (!b.url ? " no-link" : "");

      // ── ปุ่มหลัก ──
      const btnMain = document.createElement("button");
      btnMain.className = "btn-main";
      if (b.url) btnMain.onclick = () => window.open(b.url, "_blank");
      else btnMain.disabled = true;

      const starBtn = document.createElement("button");
      starBtn.className = "star-btn" + (isStarred ? " on" : "");
      starBtn.textContent = "★";
      starBtn.onclick = (e) => { e.stopPropagation(); toggleStar(b.id); };

      const idSpan = document.createElement("span");
      idSpan.className = "branch-id";
      idSpan.textContent = b.id;

      const nameSpan = document.createElement("span");
      nameSpan.className = "branch-name";
      nameSpan.textContent = b.name;

      btnMain.appendChild(starBtn);
      btnMain.appendChild(idSpan);
      btnMain.appendChild(nameSpan);

      if (!b.url) {
        const badge = document.createElement("span");
        badge.className = "no-link-badge";
        badge.textContent = "⚠ ยังไม่มีลิงก์";
        btnMain.appendChild(badge);
      }

      card.appendChild(btnMain);

      // ── footer: link text + copy btn ──
      if (b.url) {
        const footer = document.createElement("div");
        footer.className = "card-footer";

        const linkText = document.createElement("span");
        linkText.className = "link-text";
        linkText.textContent = b.url;

        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn";
        copyBtn.textContent = "📋 Copy";
        copyBtn.onclick = (e) => {
          e.stopPropagation();
          navigator.clipboard.writeText(b.url).then(() => {
            copyBtn.textContent = "✅ Copied!";
            copyBtn.classList.add("copied");
            showToast();
            setTimeout(() => {
              copyBtn.textContent = "📋 Copy";
              copyBtn.classList.remove("copied");
            }, 2000);
          });
        };

        footer.appendChild(linkText);
        footer.appendChild(copyBtn);
        card.appendChild(footer);
      }

      grid.appendChild(card);
    });
  }

  function filterBranches() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderGrid(branches.filter(b =>
      String(b.id).includes(q) || b.name.toLowerCase().includes(q)
    ));
  }

  function toggleStar(id) {
    starred.has(id) ? starred.delete(id) : starred.add(id);
    filterBranches();
  }

  let toastTimer;
  function showToast() {
    const toast = document.getElementById("toast");
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2000);
  }

  renderGrid(branches);
</script>
</body>
</html>
