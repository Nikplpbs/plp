<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เลือกสาขา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Sarabun',sans-serif;min-height:100vh;background:linear-gradient(135deg,#f0f9ff 0%,#fefce8 100%);padding:16px}
    .card{background:#fff;border-radius:20px;padding:20px 16px;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:600px;margin:0 auto}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .header-img{width:48px;height:48px;object-fit:contain;flex-shrink:0}
    .title{font-size:18px;font-weight:700;color:#1e293b}
    .subtitle{font-size:12px;color:#64748b;margin-top:2px}
    .quick-link{display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#1a5fa8,#0e4080);color:#fff;text-decoration:none;border-radius:14px;padding:12px 18px;margin-bottom:16px;box-shadow:0 4px 14px rgba(26,95,168,.35);transition:all .15s;-webkit-tap-highlight-color:transparent}
    .quick-link:active{opacity:.85;transform:scale(.98)}
    .quick-link-logo{height:52px;width:auto;max-width:140px;object-fit:contain;flex-shrink:0}
    .ql-title{font-size:15px;font-weight:700;line-height:1.3}
    .ql-sub{font-size:11px;opacity:.8;margin-top:2px}
    .quick-link-arrow{margin-left:auto;font-size:22px;opacity:.8;flex-shrink:0}
    .divider{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .divider-line{flex:1;height:1px;background:#e2e8f0}
    .divider-text{font-size:12px;color:#94a3b8;white-space:nowrap}
    .search{width:100%;padding:12px 16px;border-radius:14px;border:1.5px solid #e2e8f0;font-size:16px;font-family:'Sarabun',sans-serif;margin-bottom:14px;outline:none;background:#f8fafc}
    .search:focus{border-color:#93c5fd}
    .list{display:flex;flex-direction:column;gap:8px}
    .branch-card{border-radius:14px;border:1.5px solid #e2e8f0;background:#f8fafc;overflow:hidden;display:flex;align-items:center;transition:all .15s}
    .branch-card:active{background:#f1f5f9}
    .branch-card.no-link{opacity:.45}
    .btn-main{flex:1;background:none;border:none;padding:10px 12px;text-align:left;cursor:pointer;font-family:'Sarabun',sans-serif;min-height:60px;display:flex;align-items:center;gap:10px}
    .btn-main:disabled{cursor:not-allowed}
    .branch-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0}
    .branch-info{display:flex;flex-direction:column}
    .branch-id{font-size:15px;font-weight:700;color:#1e293b}
    .branch-name{font-size:12px;color:#64748b;margin-top:2px;line-height:1.4}
    .no-link-badge{font-size:11px;color:#ef4444;margin-top:3px}
    .copy-btn{flex-shrink:0;margin:0 10px;padding:9px 16px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:10px;font-size:13px;font-family:'Sarabun',sans-serif;cursor:pointer;color:#475569;white-space:nowrap;transition:all .15s;min-width:84px;text-align:center}
    .copy-btn:active{background:#e2e8f0}
    .copy-btn.copied{background:#dcfce7;border-color:#86efac;color:#16a34a}
    .empty{text-align:center;color:#94a3b8;padding:32px 0;font-size:14px}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:#1e293b;color:#fff;padding:10px 22px;border-radius:30px;font-size:14px;opacity:0;transition:all .25s ease;pointer-events:none;z-index:999;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>

  function renderList() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    const list = document.getElementById("list");
    list.innerHTML = "";
    const filtered = branches.filter(b => String(b.id).includes(q) || b.name.toLowerCase().includes(q));
    if (!filtered.length) { list.innerHTML='<div class="empty">ไม่พบสาขาที่ค้นหา</div>'; return; }
    filtered.forEach(b => {
      const card = document.createElement("div");
      card.className = "branch-card" + (!b.url ? " no-link" : "");
      const btn = document.createElement("button");
      btn.className = "btn-main";
      if (b.url) btn.addEventListener("click", () => window.open(b.url, "_blank"));
      else btn.disabled = true;
      const logo = document.createElement("img");
      logo.className = "branch-logo"; logo.src = SEV_IMG; logo.alt = "7-Eleven";
      const info = document.createElement("div"); info.className = "branch-info";
      const idEl = document.createElement("span"); idEl.className = "branch-id"; idEl.textContent = b.id;
      const nameEl = document.createElement("span"); nameEl.className = "branch-name"; nameEl.textContent = b.name;
      info.appendChild(idEl); info.appendChild(nameEl);
      if (!b.url) {
        const badge = document.createElement("span");
        badge.className = "no-link-badge"; badge.textContent = "⚠ ยังไม่มีลิงก์";
        info.appendChild(badge);
      }
      btn.appendChild(logo); btn.appendChild(info); card.appendChild(btn);
      if (b.url) {
        const copyBtn = document.createElement("button");
        copyBtn.className = "copy-btn"; copyBtn.textContent = "📋 Copy";
        copyBtn.addEventListener("click", () => {
          navigator.clipboard.writeText(b.url).then(() => {
            copyBtn.textContent = "✅ Copied"; copyBtn.classList.add("copied"); showToast();
            setTimeout(() => { copyBtn.textContent = "📋 Copy"; copyBtn.classList.remove("copied"); }, 2000);
          });
        });
        card.appendChild(copyBtn);
      }
      list.appendChild(card);
    });
  }

  let toastTimer;
  function showToast() {
    const t = document.getElementById("toast");
    t.classList.add("show"); clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
  }
  renderList();
